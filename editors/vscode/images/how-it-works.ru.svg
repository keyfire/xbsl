<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560" viewBox="0 0 820 560">
  <style>
    text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .mono { font-family: Consolas, 'Cascadia Mono', Menlo, monospace; }
    .zone-label { font-size: 11.5px; font-weight: 600; letter-spacing: 1.5px; fill: #7f8aa3; }
    .box-title { font-size: 15px; font-weight: 600; fill: #eef1f8; }
    .box-sub { font-size: 12px; fill: #7f8aa3; }
    .box-body { font-size: 12.5px; fill: #aab3c7; }
    .code { font-size: 11.5px; fill: #c9d4ea; }
    .code-dim { font-size: 11.5px; fill: #8b95ab; }
    .edge-label { font-size: 12.5px; font-weight: 600; fill: #c6cddd; }
    .edge-sub { font-size: 11.5px; font-style: italic; fill: #8b95ab; }
    .box { fill: #232a38; stroke: #3b445c; }
    .edge { stroke: #6d7891; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6d7891"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="0.5" y="0.5" width="819" height="559" rx="12" fill="#14171e" stroke="#262c38"/>

  <!-- zones -->
  <rect x="14" y="30" width="232" height="516" rx="10" fill="#181c26" stroke="#2c3345" stroke-dasharray="5 4"/>
  <rect x="262" y="30" width="280" height="516" rx="10" fill="#181c26" stroke="#2c3345" stroke-dasharray="5 4"/>
  <rect x="558" y="30" width="248" height="516" rx="10" fill="#181c26" stroke="#2c3345" stroke-dasharray="5 4"/>
  <text x="30" y="54" class="zone-label">VS CODE</text>
  <text x="278" y="54" class="zone-label">ДВИЖОК XBSL</text>
  <text x="574" y="54" class="zone-label">ПРОЕКТ</text>

  <!-- feature bus -->
  <line x1="252" y1="110" x2="252" y2="410" class="edge"/>
  <line x1="230" y1="110" x2="252" y2="110" class="edge"/>
  <line x1="230" y1="210" x2="252" y2="210" class="edge"/>
  <line x1="230" y1="310" x2="252" y2="310" class="edge"/>
  <line x1="230" y1="410" x2="252" y2="410" class="edge"/>

  <!-- edges -->
  <line x1="252" y1="158" x2="278" y2="158" class="edge" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <line x1="252" y1="340" x2="278" y2="340" class="edge" stroke-dasharray="5 4" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <line x1="526" y1="165" x2="574" y2="165" class="edge" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="550" y="152" text-anchor="middle" class="edge-sub">читает</text>

  <!-- Diagnostics -->
  <rect x="30" y="68" width="200" height="84" rx="8" class="box"/>
  <rect x="30" y="76" width="3" height="68" rx="1.5" fill="#3794ff"/>
  <text x="44" y="92" class="box-title">Диагностика</text>
  <text x="44" y="114" class="box-body">по мере набора; проект</text>
  <text x="44" y="132" class="box-body">целиком по сохранению + фиксы</text>

  <!-- Metadata tree -->
  <rect x="30" y="168" width="200" height="84" rx="8" class="box"/>
  <rect x="30" y="176" width="3" height="68" rx="1.5" fill="#f778ba"/>
  <text x="44" y="192" class="box-title">Дерево метаданных</text>
  <text x="44" y="214" class="box-body">создаёт объекты, реквизиты,</text>
  <text x="44" y="232" class="box-body">формы через движок</text>

  <!-- Form preview -->
  <rect x="30" y="268" width="200" height="84" rx="8" class="box"/>
  <rect x="30" y="276" width="3" height="68" rx="1.5" fill="#56d364"/>
  <text x="44" y="292" class="box-title">Предпросмотр формы</text>
  <text x="44" y="314" class="box-body">каркас формы</text>
  <text x="44" y="332" class="box-body">+ панель свойств</text>

  <!-- Docs panel -->
  <rect x="30" y="368" width="200" height="84" rx="8" class="box"/>
  <rect x="30" y="376" width="3" height="68" rx="1.5" fill="#a78bfa"/>
  <text x="44" y="392" class="box-title">Панель документации</text>
  <text x="44" y="414" class="box-body">справка Элемента</text>
  <text x="44" y="432" class="box-body">по символу под курсором</text>

  <!-- LSP server -->
  <rect x="278" y="68" width="248" height="180" rx="8" class="box"/>
  <rect x="278" y="76" width="3" height="164" rx="1.5" fill="#f0883e"/>
  <text x="292" y="92" class="box-title">xbsl-lsp</text>
  <text x="292" y="110" class="box-sub">(долгоживущий сервер, stdio)</text>
  <text x="292" y="136" class="box-body">пофайловый линт при наборе,</text>
  <text x="292" y="154" class="box-body">проектный по сохранению, индекс:</text>
  <text x="292" y="172" class="box-body">определения, дополнение, hover</text>
  <text x="292" y="198" class="mono code">xbsl/docs* · xbsl/meta*</text>
  <text x="292" y="222" class="mono code-dim">pip install "xbsl[lsp]"</text>

  <!-- CLI fallback -->
  <rect x="278" y="286" width="248" height="110" rx="8" fill="#232a38" stroke="#3b445c" stroke-dasharray="5 4"/>
  <rect x="278" y="294" width="3" height="94" rx="1.5" fill="#39c5cf"/>
  <text x="292" y="310" class="box-title">Режим CLI</text>
  <text x="292" y="334" class="mono code">xbsl --stdin · --dry-run</text>
  <text x="292" y="358" class="box-body">те же проверки и скаффолдинг,</text>
  <text x="292" y="376" class="box-body">когда сервер недоступен</text>

  <!-- footnote -->
  <text x="402" y="444" text-anchor="middle" class="box-sub">скаффолдинг возвращает полные тексты –</text>
  <text x="402" y="462" text-anchor="middle" class="box-sub">расширение применяет их одной</text>
  <text x="402" y="480" text-anchor="middle" class="box-sub">обратимой правкой (WorkspaceEdit)</text>

  <!-- Sources -->
  <rect x="574" y="110" width="216" height="118" rx="8" class="box"/>
  <rect x="574" y="118" width="3" height="102" rx="1.5" fill="#56d364"/>
  <text x="588" y="134" class="box-title">Исходники</text>
  <text x="588" y="160" class="mono code">Имя.yaml · Имя.xbsl</text>
  <text x="588" y="184" class="box-body">пары: описание элемента</text>
  <text x="588" y="202" class="box-body">+ модуль кода</text>

  <!-- Baseline -->
  <rect x="574" y="330" width="216" height="112" rx="8" class="box"/>
  <rect x="574" y="338" width="3" height="96" rx="1.5" fill="#7f8aa3"/>
  <text x="588" y="354" class="box-title">Базлайн</text>
  <text x="588" y="378" class="mono code">.xbsllint-baseline</text>
  <text x="588" y="400" class="box-body">исключённые находки,</text>
  <text x="588" y="418" class="box-body">учитываются каждым прогоном</text>
</svg>
