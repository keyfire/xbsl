name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      # Данные о языке в репозиторий не входят (генерируются из дистрибутива), поэтому
      # зависящие от данных тесты пропускаются; проверяются установка, импорт и смоук на
      # матрице версий Python.
      - name: Tests
        run: pytest -q
