# Нативные колёса (mypyc): лексер и парсер компилируются в C-расширения под
# Windows / Linux (manylinux) / macOS (x86_64 + arm64). Пользователю компилятор не
# нужен: pip ставит готовое колесо своей платформы, а для платформ без колеса
# остаётся универсальное py3-none-any (обычный релиз, чистый Python).
#
# Пока запускается вручную (workflow_dispatch) - обкатка перед включением в релизный
# цикл. После обкатки шаг upload подключается к pypi-publish по тегу.
name: native-wheels

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pypa/cibuildwheel@v4.1
        env:
          XBSL_MYPYC: "1"
          # Linux собирается в docker-контейнере - env туда пробрасывает CIBW_ENVIRONMENT.
          CIBW_ENVIRONMENT: 'XBSL_MYPYC="1"'
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          # PEP 517-изоляция прячет установленный mypy от сборки - собираем без неё.
          CIBW_BUILD_FRONTEND: "build; args: --no-isolation"
          CIBW_BEFORE_BUILD: "pip install mypy setuptools wheel"
          # Дым-тест без данных Элемента: модули импортируются и они нативные
          # (полный разбор требует language.json - его в тестовом окружении нет).
          CIBW_TEST_COMMAND: >-
            python -c "import xbsl.lexer, xbsl.parser;
            assert not xbsl.lexer.__file__.endswith('.py'), xbsl.lexer.__file__;
            assert not xbsl.parser.__file__.endswith('.py'), xbsl.parser.__file__"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
