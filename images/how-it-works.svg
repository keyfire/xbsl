<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560" viewBox="0 0 820 560">
  <style>
    text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .mono { font-family: Consolas, 'Cascadia Mono', Menlo, monospace; }
    .zone-label { font-size: 11.5px; font-weight: 600; letter-spacing: 1.5px; fill: #7f8aa3; }
    .box-title { font-size: 15px; font-weight: 600; fill: #eef1f8; }
    .box-sub { font-size: 12px; fill: #7f8aa3; }
    .box-body { font-size: 12.5px; fill: #aab3c7; }
    .code { font-size: 11.5px; fill: #c9d4ea; }
    .code-dim { font-size: 11.5px; fill: #8b95ab; }
    .edge-label { font-size: 12.5px; font-weight: 600; fill: #c6cddd; }
    .edge-sub { font-size: 11.5px; font-style: italic; fill: #8b95ab; }
    .box { fill: #232a38; stroke: #3b445c; }
    .edge { stroke: #6d7891; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6d7891"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="0.5" y="0.5" width="819" height="559" rx="12" fill="#14171e" stroke="#262c38"/>

  <!-- zones -->
  <rect x="14" y="30" width="206" height="516" rx="10" fill="#181c26" stroke="#2c3345" stroke-dasharray="5 4"/>
  <rect x="236" y="30" width="300" height="516" rx="10" fill="#181c26" stroke="#2c3345" stroke-dasharray="5 4"/>
  <rect x="552" y="30" width="254" height="516" rx="10" fill="#181c26" stroke="#2c3345" stroke-dasharray="5 4"/>
  <text x="30" y="54" class="zone-label">PROJECT SOURCES</text>
  <text x="252" y="54" class="zone-label">XBSL ENGINE</text>
  <text x="520" y="54" text-anchor="end" class="mono code-dim">pip install xbsl</text>
  <text x="568" y="54" class="zone-label">SURFACES</text>

  <!-- edges: sources / engine -->
  <line x1="204" y1="150" x2="252" y2="150" class="edge" marker-end="url(#ah)"/>
  <text x="228" y="138" text-anchor="middle" class="edge-sub">reads</text>
  <path d="M252,366 H232 V190 H204" class="edge" marker-end="url(#ah)"/>
  <text x="226" y="284" text-anchor="end" class="edge-sub">writes</text>

  <!-- edges: engine / surfaces -->
  <line x1="520" y1="116" x2="568" y2="116" class="edge" marker-end="url(#ah)"/>
  <line x1="520" y1="236" x2="568" y2="236" class="edge" marker-end="url(#ah)"/>
  <line x1="520" y1="356" x2="568" y2="356" class="edge" marker-end="url(#ah)"/>
  <path d="M520,270 H544 V476 H568" class="edge" marker-end="url(#ah)"/>

  <!-- Sources -->
  <rect x="30" y="110" width="174" height="118" rx="8" class="box"/>
  <rect x="30" y="118" width="3" height="102" rx="1.5" fill="#56d364"/>
  <text x="44" y="134" class="box-title">Sources</text>
  <text x="44" y="160" class="mono code">Имя.yaml · Имя.xbsl</text>
  <text x="44" y="184" class="box-body">element description</text>
  <text x="44" y="202" class="box-body">+ code module</text>

  <!-- Baseline -->
  <rect x="30" y="360" width="174" height="112" rx="8" class="box"/>
  <rect x="30" y="368" width="3" height="96" rx="1.5" fill="#7f8aa3"/>
  <text x="44" y="384" class="box-title">Baseline</text>
  <text x="44" y="408" class="mono code">.xbsllint-baseline</text>
  <text x="44" y="430" class="box-body">frozen legacy findings,</text>
  <text x="44" y="448" class="box-body">suppressed in every run</text>

  <!-- Engine core -->
  <rect x="252" y="68" width="268" height="230" rx="8" class="box"/>
  <rect x="252" y="76" width="3" height="214" rx="1.5" fill="#f0883e"/>
  <text x="266" y="92" class="box-title">Engine core</text>
  <text x="266" y="118" class="box-body">linter: tiers A–D, style rules,</text>
  <text x="266" y="136" class="box-body">typography, unknown types</text>
  <text x="266" y="154" class="box-body">autofixes (--fix)</text>
  <text x="266" y="172" class="box-body">project index: definitions,</text>
  <text x="266" y="190" class="box-body">references, completion</text>
  <text x="266" y="208" class="box-body">documentation search</text>
  <text x="266" y="236" class="mono code-dim">bilingual ru / en diagnostics</text>

  <!-- Metadata scaffolding -->
  <rect x="252" y="318" width="268" height="96" rx="8" class="box"/>
  <rect x="252" y="326" width="3" height="80" rx="1.5" fill="#f778ba"/>
  <text x="266" y="342" class="box-title">Metadata scaffolding</text>
  <text x="266" y="366" class="box-body">objects · fields · routes · forms</text>
  <text x="266" y="388" class="mono code">uuid + precise yaml edits</text>

  <!-- Plugin -->
  <rect x="252" y="442" width="268" height="84" rx="8" fill="#232a38" stroke="#3b445c" stroke-dasharray="5 4"/>
  <rect x="252" y="450" width="3" height="68" rx="1.5" fill="#ffd23f"/>
  <text x="266" y="466" class="box-title">Your plugin</text>
  <text x="266" y="488" class="box-body">Element language data,</text>
  <text x="266" y="506" class="box-body">private rules (entry points)</text>

  <!-- CLI -->
  <rect x="568" y="68" width="222" height="96" rx="8" class="box"/>
  <rect x="568" y="76" width="3" height="80" rx="1.5" fill="#39c5cf"/>
  <text x="582" y="92" class="box-title">CLI</text>
  <text x="582" y="116" class="mono code">xbsl &lt;path&gt; · xbsl new-object</text>
  <text x="582" y="140" class="box-body">terminal and CI gates</text>

  <!-- LSP -->
  <rect x="568" y="188" width="222" height="96" rx="8" class="box"/>
  <rect x="568" y="196" width="3" height="80" rx="1.5" fill="#3794ff"/>
  <text x="582" y="212" class="box-title">LSP server</text>
  <text x="582" y="236" class="mono code">xbsl-lsp</text>
  <text x="582" y="260" class="box-body">VS Code extension keyfire.xbsl</text>

  <!-- MCP -->
  <rect x="568" y="308" width="222" height="96" rx="8" class="box"/>
  <rect x="568" y="316" width="3" height="80" rx="1.5" fill="#a78bfa"/>
  <text x="582" y="332" class="box-title">MCP server</text>
  <text x="582" y="356" class="mono code">xbsl-mcp</text>
  <text x="582" y="380" class="box-body">AI agents: lint, docs, meta_*</text>

  <!-- Web -->
  <rect x="568" y="428" width="222" height="96" rx="8" class="box"/>
  <rect x="568" y="436" width="3" height="80" rx="1.5" fill="#56d364"/>
  <text x="582" y="452" class="box-title">Web UI</text>
  <text x="582" y="476" class="mono code">xbsl-web</text>
  <text x="582" y="500" class="box-body">local report · 127.0.0.1 only</text>
</svg>
